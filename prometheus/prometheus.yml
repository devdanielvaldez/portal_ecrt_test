global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']

  - job_name: 'microservices'
    static_configs:
      - targets:
        - 'ad-service:3000'
        - 'auth-service:3000'
        - 'bi-service:3000'
        - 'crypto-service:3000'
        - 'device-service:3000'
        - 'finance-service:3000'
        - 'media-service:3000'
        - 'message-service:3000'
        - 'org-service:3000'
